on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.26"
          enable-cache: true
      - run: uv python install
      - run: uv sync --locked --all-extras --dev
      - name: Checks
        run: |
          uv run pytest tests.py
          uv run pyright
          uv run ruff check .
        working-directory: rplugin/python3
